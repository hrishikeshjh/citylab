<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#FDBA74" />
    </linearGradient>
  </defs>
  
  <!-- Icon: Flask with Pulsing Heart Line -->
  <g transform="translate(10, 5)">
    <!-- Shield/Hexagon BG -->
    <rect x="0" y="0" width="40" height="40" rx="12" fill="url(#logo-grad)" />
    
    <!-- Flask Outline in White -->
    <path d="M15 13 L15 16 L12 22 C11.5 23 11.5 24.5 12.5 25.5 C13.5 26.5 15 27 16 27 L24 27 C25 27 26.5 26.5 27.5 25.5 C28.5 24.5 28.5 23 28 22 L25 16 L25 13 Z" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="2" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <!-- Liquid Level & Bubbles -->
    <path d="M14 20 L26 20 C26.5 21.5 26 23.5 25 24.5 C24 25.5 22.5 26 21 26 L19 26 C17.5 26 16 25.5 15 24.5 C14 23.5 13.5 21.5 14 20 Z" 
          fill="#FFFFFF" 
          opacity="0.3" />
          
    <!-- Bubble -->
    <circle cx="20" cy="17" r="1.5" fill="#FFFFFF" opacity="0.8" />
  </g>
  
  <!-- Brand Text -->
  <g transform="translate(62, 28)">
    <text font-family="'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif" 
          font-size="20" 
          font-weight="800" 
          fill="#1F2937" 
          letter-spacing="-0.5">City Lab</text>
    <text font-family="'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif" 
          font-size="9" 
          font-weight="600" 
          fill="#6B7280" 
          letter-spacing="3" 
          transform="translate(1, 12)">DIAGNOSTICS</text>
  </g>
</svg>
